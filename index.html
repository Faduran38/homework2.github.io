<html lang="en">
  <head>
  <meta charset="utf-8">
  <title>Faviana's HW 2</title>
  <!-- Load in External CSS -->
  <link rel="stylesheet" href="mis3371hw2.css">
  </head>
  <!-- Header of HTML -->
  <header>
    <h1>MedicalFirst Clinic</h1>
  </header>
  <td>
    <div id="bannerimage" class="center">
      <img src="hospital.png" alt="hospital logo" width="300" height="200" width="50%">
    </div>
    <div id="mainheader">
      <h2>PATIENT REGISTRATION FORM</h2>
      <table width="100%">
        <td valign="bottom" align="right">Today's date is: <span id="today">Date goes here </span></
  </td>
      </table>
    </div>
  <hr>
    <div id="header">
      <form action="mis3371hw2-final.html">
        <table class="form">
          <tr class="form">
            <th class="form" colspan="3">New Patient Registration</th>
          </tr>
          <tr class="form"></tr>
          <td align="left"></td>
        </table>
      </hr>
        <!-- Body Elements -->
        <body>
          <table>
            <tr>
              <span>
                <ul>
                  <div id="name">
                    <td align="left">
                      <li><label for="firstname">First Name</label></li>
                      <input type="text" size="30"
                        minlength="1" maxlength="30"
                        pattern="[A-Z^a-z-' ^~]{2,}"
                        name="firstname"
                        placeholder="First Name"
                        required>
                      <li><label for="middleinitial">Middle Initial: </label></li>
                      <input type="text" size="30"
                        minlength="1" maxlength="1"
                        pattern="[A-Za-z]{0,}"
                        name="middleinitial"
                        placeholder="MI"
                        required>
                      <li><label for="lastname">Last Name: </label></li>
                      <input type="text" size="30"
                        minlength="1" maxlength="30"
                        name="lastname"
                        placeholder="Last Name"
                        required>
                </ul>
              </span>
            </tr>
          </table>
          <span id="gov_name"></span>
          <tr>
            <div id="dob">
              <td><label for="birthdate">Date of Birth: </label></td>
              <input type="date" id="birthdate" name="birthdate"
                title="Please select the day you were born"
                min="1906-03-25" max="2026-03-24"required>
            </div>      
          </tr>
          <tr>
            <div id="ssn">
              <td><label for="ssn">SSN: </label></td>
              <td>
                <input type="text" id="ssn" name="ssn" pattern="\d{3}-\d{2}-\d{4}"
                  title="Enter your SSN">
              </td>
          </tr>
          
     </body>
        <!-- Enter in Javascript -->
        <script src="mis3371hw2.js"></script>
        <script>
          document.getElementById("today").innerHTML = new Date().toLocaleDateString();
        </script>
