<html lang="en">
  <head>
  <meta charset="utf-8">
  <title>Faviana's HW 2</title>
  <!-- Load in External CSS -->
  <link rel="stylesheet" href="mis3371hw2.css">
  </head>
  <!-- Header of HTML -->
  <header>
    <h1>MedicalFirst Clinic</h1>
  </header>
  <td>
    <div id="bannerimage" class="center">
      <img src="hospital.png" alt="hospital logo" width="300" height="200" width="50%">
    </div>
    <div id="mainheader">
      <h2>PATIENT REGISTRATION FORM</h2>
      <table width="100%">
        <td valign="bottom" align="right">Today's date is: <span id="today">Date goes here </span></
  </td>
      </table>
    </div>
  <hr>
    <div id="header">
      <form action="mis3371hw2-final.html">
        <table class="form">
          <tr class="form">
            <th class="form" colspan="3">New Patient Registration</th>
          </tr>
          <tr class="form"></tr>
          <td align="left"></td>
        </table>
      </hr>
        <!-- Body Elements -->
        <body>
          <table>
            <tr>
              <span>
                <ul>
                  <div id="name">
                    <td align="left">
                      <li><label for="firstname">First Name</label></li>
                      <input type="text" size="30"
                        minlength="1" maxlength="30"
                        pattern="[A-Z^a-z-' ^~]{2,}"
                        name="firstname"
                        placeholder="First Name"
                        required>
                      <li><label for="middleinitial">Middle Initial: </label></li>
                      <input type="text" size="30"
                        minlength="1" maxlength="1"
                        pattern="[A-Za-z]{0,}"
                        name="middleinitial"
                        placeholder="MI"
                        required>
                      <li><label for="lastname">Last Name: </label></li>
                      <input type="text" size="30"
                        minlength="1" maxlength="30"
                        name="lastname"
                        placeholder="Last Name"
                        required>
                </ul>
              </span>
            </tr>
          </table>
          <span id="gov_name"></span>
          <tr>
            <div id="dob">
              <td><label for="birthdate">Date of Birth: </label></td>
              <input type="date" id="birthdate" name="birthdate"
                title="Please select the day you were born"
                min="1906-03-25" max="2026-03-24"required>
            </div>      
          </tr>
          <tr>
            <div id="ssn">
              <td><label for="ssn">SSN: </label></td>
              <td>
                <input type="text" id="ssn" name="ssn" pattern="\d{3}-\d{2}-\d{4}"
                  value="FakePSW"
                  title="Enter your SSN">
              </td>
            </div>
          </tr>
          <tr class="form">
            <td align="right">
              <label for="address1">Address: </label>
            </td>
          <td>
            <input type="text" size="30"
              minlength="2" maxlength="30" id ="address1" name="address1"
              placeholder="Primary Address" required >
          </td>
          </tr>
          <tr class="form">
            <td align="right">
              <label for="city">City: </label>
              <input type="text" size="10" minlength="2" maxlength="30" id="city" name="city"
                required>
              <label for="state">State: </label>
              <td>
                <select required>
                  <option value=""></option>
                  <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="DC">District Of Columbia</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
                </select>
                <label for="zip">Zipcode: </label>
                <input type="text" pattern="[0-9]{10}" name="zip" placeholder="Zipcode">
              </td>
          </tr>
          
          
     </body>
        <!-- Enter in Javascript -->
        <script src="mis3371hw2.js"></script>
        <script>
          document.getElementById("today").innerHTML = new Date().toLocaleDateString();
        </script>
